name: "CI/CD: Build and Deploy"

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Terraform Infrastructure"]
    types:
      - completed

jobs:
  ansible:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Exam Repo"
        uses: actions/checkout@v4

      - name: "2. Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "3. Build and Push Dev Image"
        run: |
          git clone -b develop https://github.com/YulianSalo/devops-exam-pt2.git dev_app
          cd dev_app
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:develop .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:develop

      - name: "4. Build and Push Release Image"
        run: |
          git clone -b 1.0.0 https://github.com/YulianSalo/devops-exam-pt2.git release_app
          cd release_app
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:1.0.0 .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/exam-app:1.0.0

      - name: "5. Run Ansible Playbook"
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: setup.yml
          directory: task2
          inventory: |
            [nodes]
            minchuk-node ansible_host=134.122.78.232 ansible_user=root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --extra-vars "ansible_ssh_extra_args='-o StrictHostKeyChecking=no'"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
