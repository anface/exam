name: "Terraform Infrastructure"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: "Terraform Build"
    runs-on: ubuntu-latest
    
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Init"
        run: |
          cd task1
          terraform init \
            -backend-config="access_key=${{ secrets.DIGITALOCEAN_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DIGITALOCEAN_SECRET_KEY }}"

      - name: "Terraform Plan (Перевірка)"
        id: plan
        run: |
          cd task1
          terraform plan -no-color

      - name: "Terraform Apply (Реальне розгортання)"
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd task1
          terraform apply -auto-approve
