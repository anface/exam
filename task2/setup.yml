---
- name: "Task 2 & 3: Infrastructure Setup and App Deployment"
  hosts: all
  become: no
  tasks:
    - name: "1. Оновлення системних пакетів"
      apt:
        update_cache: yes
        name: [apt-transport-https, ca-certificates, curl, software-properties-common, conntrack, socat]

    - name: "2. Встановлення Docker"
      apt:
        name: docker.io
        state: present

    - name: "3. Встановлення kubectl, crictl та Minikube"
      shell: |
        # kubectl
        curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
        # crictl (необхідний для драйвера none)
        VERSION="v1.28.0"
        curl -L https://github.com/kubernetes-sigs/cri-tools/releases/download/$VERSION/crictl-$VERSION-linux-amd64.tar.gz --output crictl.tar.gz
        tar zxvf crictl.tar.gz -C /usr/local/bin
        # minikube
        curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        install minikube-linux-amd64 /usr/local/bin/minikube

    - name: "4. Встановлення Helm"
      shell: "curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
      args:
        creates: /usr/local/bin/helm

    - name: "5. Очищення перед запуском"
      command: minikube delete --all --purge
      ignore_errors: yes

    - name: "6. Запуск Minikube (Driver None)"
      command: minikube start --driver=none --force
      register: minikube_start

    - name: "7. Запуск kubectl proxy"
      shell: "nohup kubectl proxy --port=8001 --address='0.0.0.0' --accept-hosts='.*' > /dev/null 2>&1 &"
      async: 10
      poll: 0

    - name: "8. Деплой DEV (Port 8002)"
      command: >
        helm upgrade --install dev-app ../task3 
        --set image.tag=develop 
        --set service.nodePort=8002 
        --set image.repository={{ lookup('env', 'DOCKERHUB_USERNAME') }}/exam-app
      environment:
        KUBECONFIG: /root/.kube/config

    - name: "9. Деплой RELEASE (Port 8003)"
      command: >
        helm upgrade --install release-app ../task3 
        --set image.tag=1.0.0 
        --set service.nodePort=8003
        --set image.repository={{ lookup('env', 'DOCKERHUB_USERNAME') }}/exam-app
      environment:
        KUBECONFIG: /root/.kube/config

    - name: "10. Перевірка результату"
      command: kubectl get pods
      register: pods_status
      environment:
        KUBECONFIG: /root/.kube/config

    - name: "11. Вивід статусів"
      debug:
        msg: "{{ pods_status.stdout }}"
